name: Live canary

# Runs the :live suite against the real Claude Managed Agents and Bedrock
# AgentCore APIs. Both are beta surfaces that change under us.
# This workflow exists to find that drift before users do.
#
# Cheap by default: most CMA lanes run claude-haiku-4-5 (the runtime-bootstrap
# leg defaults to sonnet), the Bedrock lane runs
# nvidia.nemotron-super-3-120b (override with CMA_LIVE_MODEL /
# BEDROCK_LIVE_MODEL_ID).
#
# AWS auth is GitHub OIDC — no long-lived AWS keys. The workflow assumes
# rma-ci-github, whose trust policy only accepts runs from this repo's main
# branch. Setup reference: docs/aws-ci-setup.md.
#
# Required repository secret:  ANTHROPIC_API_KEY
# Required repository vars:    AWS_ROLE_ARN, HARNESS_EXECUTION_ROLE_ARN

on:
  schedule:
    - cron: "0 6 * * 1,4" # Mon + Thu 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC token for AWS role assumption

env:
  MIX_ENV: test

jobs:
  live:
    runs-on: ubuntu-latest
    # ANTHROPIC_API_KEY / HEX_API_KEY live in the `prod` environment —
    # jobs only see environment secrets when they declare the environment.
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "29"
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-quality-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-quality-${{ runner.os }}-
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - run: mix deps.get
      - name: Run live suite against real providers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HARNESS_EXECUTION_ROLE_ARN: ${{ vars.HARNESS_EXECUTION_ROLE_ARN }}
        run: mix test --only live
